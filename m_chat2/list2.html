<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="/common/css/style.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
	<!--NOTE: 2023.09.15 prototype.jsの使用は廃止しました。-->
</head>

<body class="chat-inner-iframe">
	<div class="wrap sub">
		<div class="l-container">
			<div class="inner chat-posts" id="inner" data-chat-posts>
				[INNER]
			</div>
		</div>
		<div id="end"></div>
	</div>
	<script>
		window.chatAutoLoaderClearID = 0;
		$(function () {

			let reqURL = '/m_chat2/chatinner2.php';
			let reqParam = paramToJSON('aid=[AID]&etc02=[ETC02]&etc03=[ETC03]&etc10=[ETC10]' + '&uid=[UID]');

			window.chatAutoLoaderClearID = setInterval(function () {

				$.ajax({
					type: 'get',
					url: reqURL,
					data: reqParam,
					dataType: 'html',
					cache: false,
				})
					.done(function (posts) {
						$('[data-chat-posts]').append(posts);// チャットの更新
						console.log(posts);
						console.log('チャットの読み込みに成功しました');
					})
					.fail(function () {
						console.log('チャットの読み込み中にエラーが発生しました');
					})
					.always(function () {
						autoScrollPageEnd();// 自動スクロール
						console.log('チャットの読み込みが完了しました');
					});

			}, 1000);// 1秒ごとに実行
		});

		// ページがロード完了時にも自動スクロール
		$(window).on('load', function () {
			autoScrollPageEnd();
		});

		// 自動スクロール
		function autoScrollPageEnd() {
			let p = $('#end').offset().top;
			$(window).scrollTop(p);
		}
		function paramToJSON(p) {
			let list = p.split('&');
			let obj = {};
			list.forEach(function (elm) {
				let val = elm.split('=');
				obj[val[0]] = val[1];
			});
			return obj;
		}
	</script>
</body>

</html>
