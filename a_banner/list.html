<div class="row">

<div class="col-md-4">

<div class="mb10">

</div>
</div>
</div>

<div class="col-xs-12">

<thead>
				<tr>
  <th>ID</th>
  <th>タイトル</th>
  <th>画像</th>
  <th>URL</th>

					<th>公開フラグ</th>

					<th>削除</th>
				</tr>
<meta LIST-START>
				<tr class="[LIST-BG]">
  <td>[D-ID]</td>
  <td>[D-TITLE]</td>
  <td><img src="[D-PIC]" width="200"/></td>
  <td><a href="[D-LINK]" target="_blank">[D-LINK]</a></td>

					<td class="w66"><a href="./?mode=edit&key=[ID]&lid=[LID]&sort=[SORT]&word=[WORD]&page=[PAGE]"><img class="over" src="/html_a/img/btn_06.jpg" width="47" height="21" alt="編集" /></a></td>

				</tr>
<meta LIST-END>
