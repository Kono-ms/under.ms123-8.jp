<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>[MIDT_NAME]さんへのお問い合わせ（確認）｜WEBSITE-NAME</title>
<meta name="description" content="お問い合わせ（確認）のページ。WEBSITE-NAMEは不動産会社と投資ユーザーを結ぶ新たなマッチングサービスです。不動産会社が求める投資ユーザーと、投資ユーザーが求める不動産会社、双方の希望条件を基にマッチング率を算出することでご自身に合った相手を見つけることをサポートします。" />
<!--template=/common/template/head.html-->
</head>

<body>
<div class="wrap sub"> 
  
  <!--template=/common/template/header.html--> 
  
  <!-- 以上共通 -->
  <div class="breadcrumb">
    <div class="l-container">
      <ol class="breadcrumb__list">
        <li class="breadcrumb__item"><a href="/">トップ</a></li>
        <li class="breadcrumb__item">[MIDT_NAME]さんへのお問い合わせ（確認）</li>
      </ol>
    </div>
  </div>
  <section class="contact">
    <div class="l-container">
      <div class="c-head">
        <h2 class="c-head__ttl">[MIDT_NAME]さんへのお問い合わせ</h2>
        <p class="c-head__txt">以下の内容で送信します。宜しければこの内容で送信ボタンを押してください</p>
      </div>
      [ERR-S]
      <div class="error_01">
        <div class="head_01">
          <div class="right">
            <div class="box">&nbsp;</div>
          </div>
          <div class="left">&nbsp;</div>
        </div>
        <div class="body">
          <p class="mLft10 mBtm05"><img src="/html_a/img/txt_04.jpg" width="203" height="28" alt="入力内容に不備があります。" /></p>
          <p class="mLft10">[ERRMSG]</p>
        </div>
        <div class="foot_01">
          <div class="right">
            <div class="box">&nbsp;</div>
          </div>
          <div class="left">&nbsp;</div>
        </div>
      </div>
      [ERR-E]
      <div class="form-box">
        <div class="formset">
          <div class="formset__item">
            <div class="formset__ttl"><span>お問い合わせ内容</span><span class="formset__must">必須</span></div>
            <div class="formset__input">[D-COMMENT]</div>
          </div>
        </div>
          <form  method="post" action="./" enctype="multipart/form-data">
            <input type="hidden" name="mode" value="[NEXTMODE]">
            <input type="hidden" name="key" value="[KEY]">
            <input type="hidden" name="sort" value="[SORT]">
            <input type="hidden" name="word" value="[WORD]">
            <input type="hidden" name="page" value="[PAGE]">
            <input type="hidden" name="lid" value="[LID]">
            <input type="hidden" name="midt" value="[MIDT]">
            <input type="hidden" name="ID" value="[ID]">
            <input type="hidden" name="COMMENT" value="[COMMENT]">
            <input type="hidden" name="NEWDATE" value="[NEWDATE]">
            <div class="btn formset__btn">
              <button type="submit">この内容で送信</button>
            </div>
          </form>
          <form  method="post" action="./" enctype="multipart/form-data">
            <input type="hidden" name="mode" value="back">
            <input type="hidden" name="key" value="[KEY]">
            <input type="hidden" name="sort" value="[SORT]">
            <input type="hidden" name="word" value="[WORD]">
            <input type="hidden" name="page" value="[PAGE]">
            <input type="hidden" name="lid" value="[LID]">
            <input type="hidden" name="midt" value="[MIDT]">
            <input type="hidden" name="ID" value="[ID]">
            <input type="hidden" name="COMMENT" value="[COMMENT]">
            <input type="hidden" name="NEWDATE" value="[NEWDATE]">
            <div class="btn formset__btn btn--small formset__btn--back">
              <button type="submit">編集画面に戻る</button>
            </div>
          </form>
      </div>
    </div>
  </section>
  
  <!-- 以下共通 --> 
  
  <!--template=/common/template/footer.html--> 
</div>
</body>
</html>
