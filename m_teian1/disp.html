  <script src="/js/tinymce_v4.9.11/tinymce.min.js"></script>

  <script>
    tinymce.init({
      selector: "#editor",
      language: "ja",
      plugins: "textcolor table lists link image jbimages preview code media imagetools",
      menubar: "false",
      toolbar: ['code | undo redo | bold italic | forecolor backcolor | fontsizeselect ',
        'numlist bullist | table | link | jbimages | alignleft aligncenter alignright alignjustify | outdent indent | media'],
      paste_as_text: true,
      fontsize_formats: '10px 12px 14px 16px 18px 20px 24px 34px',
      entity_encoding: 'raw',
      //width: 700,
      height: 600,
      relative_urls: false,
      branding: false,
      imagetools_cors_hosts: ['mydomain.com', 'otherdomain.com'],
      imagetools_credentials_hosts: ['mydomain.com', 'otherdomain.com'],
    });
    $(function () {

      //都道府県の変更
      $('[name="find_pref"]').change(function () {
        prefchange();
      });
      function prefchange() {
        let city_name = "O1_MRDO02";
        let pref = $('[name="find_pref"]').val();

        //沿線切り替え
        let line_ul = "find_line_ul";
        let line_name = "find_line";
        let lineval = $('input[name="find_line"]:checked').val();
        if (lineval != undefined) {
          lineval = lineval.replaceAll("find_line:", "");
        }
        // console.log("lineval:" + lineval);
        $.ajax({
          type: "POST",
          url: "[BASE_URL]/line_radio.php",
          async: false,
          data: {
            pref: pref,
            fieldname1: line_name,
            lineval: lineval
          }
        }).done(function (data) {
          // console.log("line_radio_done:" + data);
          $('#' + line_ul).empty(); //子要素削除
          $('#' + line_ul).html(data);

          linechange();
        }).fail(function (data) {
          console.log("error:" + data);
        });
      }
      prefchange();


      //沿線の変更
      $('body').on('change', '.find_line', function () {
        linechange();
      });

      function linechange() {
        let pref = $('[name="find_pref"]').val();
        pref = pref.replaceAll("find_pref:", "");

        //沿線切り替え
        let station_ul = "find_station_ul";
        let station_name = "find_station";
        let lineval = $('input[name="find_line"]:checked').val();
        if (lineval != undefined) {
          lineval = lineval.replaceAll("find_line:", "");
        }
        let stationval = $('input[name="find_station"]:checked').val();
        if (stationval != undefined) {
          stationval = stationval.replaceAll("find_station:", "");
        }

        // console.log("linechange_lineval:" + lineval);
        // console.log("linechange_stationval:" + stationval);
        $.ajax({
          type: "POST",
          url: "[BASE_URL]/station_radio.php",
          async: false,
          data: {
            pref: pref,
            fieldname1: station_name,
            lineval: lineval,
            stationval: stationval
          }
        }).done(function (data) {
          // console.log("station_radio_done:" + data);
          $('#' + station_ul).empty(); //子要素削除
          $('#' + station_ul).html(data);

        }).fail(function (data) {
          console.log("error:" + data);
        });
      }
    });

  </script>

  <style>
    .teian-search-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .teian-search-modal__overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .teian-search-modal:target {
      display: flex;
    }

    .teian-search-modal__dialog {
      position: relative;
      z-index: 1;
      width: min(760px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-sizing: border-box;
    }

    .teian-search-modal__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .teian-search-modal__title {
      margin: 0;
      font-size: 20px;
    }

    .teian-search-modal__close {
      display: inline-block;
      color: #122823;
      text-decoration: none;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
    }

    .teian-search-modal__form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .teian-search-modal__field-label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .teian-search-modal__field-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
    }

    .teian-search-modal__field-row span {
      text-align: center;
    }

    .teian-search-modal input,
    .teian-search-modal select {
      width: 100%;
      height: 40px;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .teian-search-modal__actions {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .teian-search-modal__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 18px;
      border: 1px solid #64a8ac;
      background: #fff;
      color: #64a8ac;
      text-decoration: none;
      cursor: pointer;
    }

    .teian-search-modal__btn--primary {
      background: #64a8ac;
      color: #fff;
    }
  </style>

  <div class="teian-search-modal" id="teianSearchModal" aria-hidden="true">
