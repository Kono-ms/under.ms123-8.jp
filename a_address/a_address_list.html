<!-- Content Header (Page header) -->
<section class="content-header">

  <h1>住所データ管理</h1>

  <ol class="breadcrumb">
    <li><a href="/admin/"><i class="fa fa-dashboard"></i> Home</a></li>
    <li>住所データ管理</li>
  </ol>
</section>


<!-- Main content -->
<section class="content">

  <div class="row">

    <div class="col-md-8">
      <div class="box box-default same_height">
        <div class="box-header with-border">
          <i class="fa fa-search"></i>
          <h3 class="box-title">絞り込み検索</h3>
        </div>
        <form method="post" action="./">
          <div class="box-body">
            <input type="hidden" name="mode" value="list">
            <input type="hidden" name="sort" value="[SORT]">
            <input type="hidden" name="page" value="1">
            <div class="row">
              <div class="col-sm-12 col-xs-12 col-vam">
                <label>条件から検索する場合はこちらに入力</label>
                <input type="text" name="word" value="[WORD]" class="form-control">
              </div>
            </div>
          </div>
          <div class="box-body">
            <div class="row">
              <div class="col-sm-4 col-xs-12 col-sm-offset-4">
                <button name="submit" value="submit" type="submit"
                  class="btn btn-block btn-success">検索する</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="col-md-4">
      <div class="box box-default same_height">
        <div class="box-body">
          <div class="mb10">
            <a href="./?mode=new&sort=[SORT]&word=[WORD]&page=[PAGE]" class="btn btn-block btn-warning"><i
                class="fa fa-plus-square"></i> 新規登録</a>
          </div>
        </div>
      </div>
    </div>


    <div class="col-xs-12">

      <div class="box box-default">
        <div class="box-body">

          <table class="table table-bordered table-hover">

            <thead>
              <tr>
                <th>CD1</th>
                <th>CD2</th>
                <th>N1</th>
                <th>N2</th>
                <th>N3</th>
                <th>PO</th>
                <th>SORT</th>
                <th>編集</th>
                <th>削除</th>
              </tr>
            </thead>
            <tbody>

              <meta LIST-START>
              <tr class="[LIST-BG]">
                <td>[D-CD1]</td>
                <td>[D-CD2]</td>
                <td>[D-N1]</td>
                <td>[D-N2]</td>
                <td>[D-N3]</td>
                <td>[D-PO]</td>
                <td>[D-SORT]</td>
                <td><a href="./?mode=edit&key=[ID]&lid=[LID]&sort=[SORT]&word=[WORD]&page=[PAGE]"
                    class="btn btn-block btn-default btn-xs"><i class="fa fa-pencil"></i> 編集</a>
                </td>
                <td><a href="./?mode=delete&key=[ID]&lid=[LID]&sort=[SORT]&word=[WORD]&page=[PAGE]&token=[TOKEN]"
                    class="btn btn-block btn-default btn-xs"
                    onclick="return confirm('削除してもよろしいですか？');"><i class="fa fa-trash"></i> 削除</a>
                </td>
              </tr>
              <meta LIST-END>

            </tbody>
          </table>

        </div><!-- /.box-body -->
      </div><!-- /.box -->

      [PAGING]

    </div><!-- /.col -->

  </div><!-- /.row -->
</section><!-- /.content -->
