<!-- Content Header (Page header) -->
<section class="content-header">

	<h1>顧客認証管理</h1>

	<ol class="breadcrumb">
		<li><i class="fa fa-dashboard"></i> Home</li>
		<li><a href="/a_member_auth/">顧客認証管理</a></li>
		<li>顧客認証登録・編集</li>
	</ol>
</section>


<!-- Main content -->
<section class="content">
	<div class="row">


		<div class="col-xs-12">
			<div class="box box-warning">

				<div class="box-header">
					<h3 class="box-title">登録・編集</h3>
				</div><!-- /.box-header -->

				<div class="box-body">

					[ERR-S]
					<div class="alert alert-warning alert-dismissible">
						<div class="message_box mb20">
							<p><i class="icon fa fa-warning"></i> 入力内容に不備がございますので、内容のご確認をお願いいたします。</p>
						</div>
						<div class="page_text">
							<ul class="error_list">
								[ERRMSG]
							</ul>
						</div>
					</div>
					[ERR-E]
					<form method="post" action="./" enctype="multipart/form-data">
						<input type="hidden" name="mode" value="save">
						<input type="hidden" name="key" value="[ID]">
						<input type="hidden" name="sort" value="[SORT]">
						<input type="hidden" name="word" value="[WORD]">
						<input type="hidden" name="page" value="[PAGE]">
						<input type="hidden" name="lid" value="[LID]">
						<input type="hidden" name="ID" value="[ID]">


						<table id="table_summary" class="table table-bordered table_edit" summary="表">

							<tr>
								<th width="140">顧客認証ID</th>
								<td><input type="text" name="AUTH_ID" value="[AUTH_ID]" size="30"></td>
							</tr>
							<tr>
								<th width="140">不動産会社のMID</th>
								<td><input type="text" name="MID1" value="[MID1]" size="30"></td>
							</tr>

							<tr>
								<th width="140">顧客認証名</th>
								<td><input type="text" name="AUTH_NAME" value="[AUTH_NAME]" size="30"></td>
							</tr>
							<tr>
								<th width="140">メールアドレス</th>
								<td><input type="text" name="EMAIL" value="[EMAIL]" size="30"></td>
							</tr>
							<tr>
								<th width="140">取り込み日時</th>
								<td><input type="text" name="IMP_DATETIME" value="[IMP_DATETIME]" size="30"></td>
							</tr>
						</table>
						<button name="submit" value="submit" type="submit" class="btn btn-block btn-default"
							onclick="var ok=confirm('保存してもよろしいですか？');if (ok) this.form.submit(); return false;"><i
								class="fa fa-floppy-o"></i> 保存</button>
					</form>


				</div><!-- /.box-body -->
			</div><!-- /.box -->


		</div><!-- /.col -->
	</div><!-- /.row -->
</section><!-- /.content -->
